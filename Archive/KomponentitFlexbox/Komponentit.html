<!DOCTYPE html>
<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <title>Komponentit</title>
        <link rel="stylesheet" href="Tyyli.css">
    </head>
    <body>
        <div class="komponentit">
            <div class="komponentti">
                <img src="Emolevy.jpg" alt="Kuva emolevystä">
                <p>Emolevy yhdistää kaikki muut osat toisiinsa.</p>
            </div>
            <div class="komponentti">
                <img src="Prosessori.jpeg" alt="Kuva prosessorista">
                <p>Prosessori on tietokoneen "hirviö", joka suorittaa ohjelmia.</p>
            </div>
            <div class="komponentti">
                <img src="Muisti.jpg" alt="Kuva muistista">
                <p>Muisti tallentaa tietoja väliaikaisesti käyttöön.</p>
            </div>
            <div class="komponentti">
                <img src="Kiintolevy.jpg" alt="Kuva kiintolevyistä">
                <p>Kiintolevy tallentaa tietoja pysyvästi.</p>
            </div>
        </div>
    </body>
</html>
