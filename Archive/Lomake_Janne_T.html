<!DOCTYPE html>
<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <title>Lomake</title>
    </head>
    <body>
        <form>
            <fieldset style="width: 400px;">
                <legend>Palautelomake</legend>

                <label for="nimi">Nimi:</label><br>
                <input type="text" id="nimi" name="nimi" tabindex="1"><br>
                <label for="sposti">Sähköposti:</label><br>
                <input type="text" id="sposti" name="sposti" tabindex="2"><br>
                <label for="viesti">Viesti:</label><br>
                <textarea id="viesti" name="viesti" tabindex="3" cols="45" rows="5"></textarea><br>
                <input type="submit" name="Laheta" id="laheta" value="Lähetä palaute" tabindex="4">
            </fieldset>
        </form>
    </body>
</html>
